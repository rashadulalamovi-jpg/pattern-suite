<style>
:root{
--bg:#f5f6f8;--s0:#eef0f3;--s1:#eaecf1;--s2:#ffffff;--bd:#e5e8ee;--bds:#d3d8e1;
--tp:#1b2027;--ts:#525a67;--tm:#888f9c;
--ac:#2459c9;--acb:#e9eefb;--acbd:#9db6f0;
--gn:#2e7d4f;--gnb:#e3f4ea;--gnbd:#84cda1;
--am:#9a5b08;--amb:#fbeed6;--ambd:#eea542;
--rd:#c2392f;--rdb:#fceae8;--rdbd:#f2a39c;
--pr:#5b4bd6;--prb:#ecebfd;--prbd:#bcb6f3;
--te:#0e7c84;--teb:#d7f1f3;--tebd:#74cdd2;
--br:#c81e1e;--brb:#fdeaea;--brd:#f3b0b0;
--rad:10px;--fs:'Hind Siliguri','Inter',system-ui,sans-serif;
--sh:0 1px 2px rgba(22,34,57,.04),0 2px 6px rgba(22,34,57,.05);
--shc:0 1px 2px rgba(22,34,57,.05),0 4px 14px rgba(22,34,57,.06);
}
@media(prefers-color-scheme:dark){:root{
--bg:#14161a;--s0:#181b20;--s1:#1e222a;--s2:#22272f;--bd:#2c323b;--bds:#3a414c;
--tp:#e7eaef;--ts:#a4abb8;--tm:#717986;
--ac:#7aa5f5;--acb:#173461;--acbd:#2459c9;
--gn:#7fd3a3;--gnb:#123d28;--gnbd:#2e7d4f;
--am:#f0b15a;--amb:#4d2f08;--ambd:#9a5b08;
--rd:#f2a39c;--rdb:#5a201b;--rdbd:#c2392f;
--pr:#b9b2f5;--prb:#2c2470;--prbd:#5b4bd6;
--te:#6fd0d6;--teb:#08474c;--tebd:#0e7c84;
--br:#f08a8a;--brb:#5a1717;--brd:#c81e1e;
--sh:0 1px 2px rgba(0,0,0,.3);--shc:0 2px 10px rgba(0,0,0,.32);
}}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tp);font-family:var(--fs);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.wrap{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg)}
.appbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--s2) 88%,transparent);backdrop-filter:saturate(1.4) blur(12px);-webkit-backdrop-filter:saturate(1.4) blur(12px);border-bottom:0.5px solid var(--bd)}
.brand{padding:13px 16px 10px;display:flex;align-items:center;gap:11px}
.brand .mono{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;letter-spacing:-.02em;background:linear-gradient(135deg,var(--ac),var(--pr));box-shadow:var(--sh)}
.brand .bx{display:flex;flex-direction:column;line-height:1.15}
.brand .eyebrow{font-size:9.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--tm)}
.brand h1{margin:0;font-size:16px;font-weight:600;letter-spacing:-.015em;color:var(--tp)}
.brand .sync{margin-left:auto;font-size:10px;color:var(--tm);display:inline-flex;align-items:center;gap:4px;background:var(--s1);padding:4px 8px;border-radius:100px}
.brand .sync::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gn)}
.appmenu{display:flex;gap:3px;margin:0 12px 10px;padding:4px;background:var(--s1);border-radius:13px}
.appmenu button{flex:1;padding:9px 4px;font-family:var(--fs);font-size:12.5px;font-weight:500;background:none;border:none;border-radius:9px;color:var(--ts);cursor:pointer;line-height:1.25;transition:background .18s,color .18s,box-shadow .18s;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.appmenu button .ti{font-size:16px}
.appmenu button.on{color:var(--ac);background:var(--s2);box-shadow:var(--sh);font-weight:600}
.tabs{display:flex;gap:4px;padding:0 12px 11px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:1 0 auto;min-width:0;padding:8px 12px;font-size:11px;font-family:var(--fs);background:var(--s1);border:none;border-radius:100px;cursor:pointer;color:var(--ts);line-height:1.3;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:background .15s,color .15s}
.tabs button .ti{font-size:15px}
.tabs button.on{background:var(--acb);color:var(--ac);font-weight:600}
.body{padding:14px 16px 40px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card{background:var(--s2);border:0.5px solid var(--bd);border-radius:16px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--sh)}
.sg{background:var(--s1);border-radius:12px;padding:11px 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.b{border-radius:100px;padding:3px 10px;font-size:11px;font-weight:600;display:inline-block;letter-spacing:.01em}
.bG{background:var(--gnb);color:var(--gn)}.bY{background:var(--amb);color:var(--am)}
.bR{background:var(--rdb);color:var(--rd)}.bB{background:var(--acb);color:var(--ac)}.bP{background:var(--prb);color:var(--pr)}
.chip{display:inline-block;padding:5px 12px;border-radius:100px;font-size:12px;border:0.5px solid var(--bds);background:var(--s2);color:var(--ts);cursor:pointer;margin:3px 3px 0 0;font-family:var(--fs);user-select:none;transition:background .15s,border-color .15s,color .15s}
.chip:active{transform:scale(.97)}
.chip.sel{background:var(--acb);color:var(--ac);border-color:var(--acbd);font-weight:500}
.lbl{font-size:12.5px;font-weight:600;color:var(--ts);display:block;margin-bottom:6px;margin-top:2px;letter-spacing:.005em}
select,textarea,input{width:100%;font-family:var(--fs);font-size:14px;border:0.5px solid var(--bds);border-radius:10px;padding:10px 12px;background:var(--s2);color:var(--tp);box-sizing:border-box;margin-bottom:12px;transition:border-color .15s,box-shadow .15s}
textarea{resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3.5px var(--acb)}
.rb{display:flex;gap:6px;margin-bottom:12px}
.rb button{flex:1;padding:10px 2px;font-family:var(--fs);font-size:13px;border:0.5px solid var(--bds);border-radius:9px;background:var(--s2);cursor:pointer;color:var(--ts);transition:background .15s,border-color .15s,color .15s}
.rb button.on{background:var(--acb);border-color:var(--acbd);color:var(--ac);font-weight:600}
.tg{display:flex;gap:6px;margin-bottom:14px}
.tg button{flex:1;padding:10px 4px;font-family:var(--fs);font-size:13px;border:0.5px solid var(--bds);border-radius:10px;background:var(--s2);cursor:pointer;color:var(--ts);transition:background .15s,border-color .15s,color .15s}
.tg button.on{background:var(--acb);border-color:var(--acbd);color:var(--ac);font-weight:600}
.sb{width:100%;padding:13px;background:var(--ac);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--fs);margin-top:4px;box-shadow:var(--sh);transition:transform .1s,filter .15s}
.sb:hover{filter:brightness(1.05)}.sb:active{transform:scale(.99)}
.fob{flex:1;padding:11px 4px;font-family:var(--fs);font-size:13px;border:0.5px solid var(--bds);border-radius:10px;background:var(--s2);cursor:pointer;color:var(--ts);transition:background .15s}
.fob.acY{background:var(--gnb);border-color:var(--gnbd);color:var(--gn);font-weight:600}
.fob.acN{background:var(--rdb);border-color:var(--rdbd);color:var(--rd);font-weight:600}
.fob.acP{background:var(--amb);border-color:var(--ambd);color:var(--am);font-weight:600}
.hr{display:flex;align-items:stretch;margin-bottom:4px;border-radius:10px;overflow:hidden;border:0.5px solid var(--bd)}
.ht{width:66px;flex-shrink:0;font-size:10px;padding:7px 4px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--tm);background:var(--s1);line-height:1.2;font-weight:500}
.hb{flex:1;padding:8px 11px;font-size:12px;display:flex;flex-direction:column;justify-content:center;min-height:38px}
.stp{flex:1;text-align:center;padding:9px 3px;border-radius:11px}
.pbar{height:8px;background:var(--s1);border-radius:100px;overflow:hidden;margin:8px 0}
.pbar div{height:100%;border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.kpiL{font-size:11px;color:var(--tm);margin-bottom:4px;font-weight:500}
.kpiV{font-weight:700;line-height:1.25;letter-spacing:-.01em}
.empty{text-align:center;padding:2.2rem 1rem;color:var(--tm);font-size:14px}
.h{font-size:14px;font-weight:700;color:var(--tp);margin:18px 0 11px;display:flex;align-items:center;gap:7px;letter-spacing:-.01em}
.muted{font-size:13px;color:var(--tm);margin-bottom:14px}
.toast{text-align:center;padding:3rem 1rem;animation:fade .3s ease}
.toast .big{font-size:46px;margin-bottom:14px}
.step{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.stepn{width:25px;height:25px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;box-shadow:var(--sh)}
.steph{font-size:14px;font-weight:700;color:var(--tp);letter-spacing:-.01em}
.tk{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:0.5px solid var(--bd)}
.ck{width:21px;height:21px;border-radius:7px;border:1.5px solid var(--bds);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .15s,border-color .15s}
.ck.on{background:var(--gn);border-color:var(--gn);color:#fff}
.miniadd{display:flex;gap:6px;margin-top:8px}
.miniadd input{margin:0}
.miniadd button{flex-shrink:0;width:44px;background:var(--ac);color:#fff;border:none;border-radius:10px;font-family:var(--fs);font-size:18px;cursor:pointer;box-shadow:var(--sh)}
.back{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--ac);background:var(--s1);border:none;cursor:pointer;font-family:var(--fs);padding:7px 13px;border-radius:100px;margin-bottom:14px;font-weight:500}
.note{font-size:12px;background:var(--s1);border-radius:10px;padding:8px 10px;margin-bottom:6px;color:var(--ts);line-height:1.55}
*:focus-visible{outline:2px solid var(--ac);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
::-webkit-scrollbar{height:5px;width:5px}::-webkit-scrollbar-thumb{background:var(--bds);border-radius:10px}

/* ===== Banking-style chrome ===== */
.hero{background:linear-gradient(157deg,#d83a3a 0%,#bd2020 52%,#8f1414 100%);padding:16px 18px 22px;color:#fff;position:relative}
.herotop{display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff;flex-shrink:0}
.hgreet{flex:1;line-height:1.25;min-width:0}
.hgreet .hi{font-size:13px;opacity:.92}
.hgreet .hname{font-size:18px;font-weight:700;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hicon{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:19px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbadge{position:absolute;top:-1px;right:-1px;min-width:16px;height:16px;border-radius:100px;background:#ffb020;color:#3a2600;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:1.5px solid #bd2020}
.herocard{margin-top:16px;background:rgba(255,255,255,.97);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:13px;box-shadow:0 10px 26px rgba(120,12,12,.28);cursor:pointer}
.hcicon{width:40px;height:40px;border-radius:11px;background:#fdeaea;color:#c81e1e;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sheet{background:var(--bg);border-radius:22px 22px 0 0;margin-top:-14px;position:relative;z-index:2;padding-top:16px}
.bottomnav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:520px;background:color-mix(in srgb,var(--s2) 94%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:0.5px solid var(--bd);display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:30;box-shadow:0 -3px 16px rgba(0,0,0,.06)}
.bottomnav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--fs);font-size:11px;font-weight:500;color:var(--tm);cursor:pointer;padding:4px 2px;border-radius:12px;transition:color .15s}
.bottomnav button .ti{font-size:22px}
.bottomnav button.on{color:#d23030}
/* ===== Red brand overrides ===== */
.sb,.miniadd button{background:#d23030;box-shadow:0 1px 2px rgba(120,12,12,.18)}
.tabs button.on{background:var(--brb);color:var(--br)}
.chip.sel{background:var(--brb);color:var(--br);border-color:var(--brd)}
.rb button.on,.tg button.on{background:var(--brb);border-color:var(--brd);color:var(--br)}
input:focus,select:focus,textarea:focus{border-color:#d23030;box-shadow:0 0 0 3.5px var(--brb)}
.back{color:var(--br);background:var(--brb)}
.bB{background:var(--brb);color:var(--br)}
*:focus-visible{outline-color:#d23030}
.body{padding:14px 16px 44px}
.appmenu{margin:14px 16px 12px}
.appmenu button.on{color:var(--br);background:var(--s2);box-shadow:var(--sh)}

.appmenu{margin:2px 0 12px}
.appmenu button.on{color:var(--br)}
.body{padding-bottom:40px}
.modal{position:fixed;inset:0;z-index:60;background:rgba(10,12,16,.45);display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal.center{align-items:center}
.modalsheet{background:var(--bg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:18px 16px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -8px 30px rgba(0,0,0,.22);animation:slideup .26s cubic-bezier(.4,0,.2,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.modalhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sw{width:44px;height:25px;border-radius:100px;background:var(--bds);border:none;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;padding:0}
.sw.on{background:var(--gn)}
.sw::after{content:"";position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.sw.on::after{left:21px}
</style>

/* ============ FIREBASE + FCM (Cowork: এখানে আপনার config বসান) ============ */
/* Firebase Console → Project settings → "Your apps" → Web app → SDK config থেকে নিচের object টা পুরোটা copy করে replace করুন */
const FB_CONFIG = {
  apiKey: "AIzaSyB6BZuchGQ-i87jHhVHtgiS0bohsXXufhk",
  authDomain: "ctg-click-shop-crm.firebaseapp.com",
  projectId: "ctg-click-shop-crm",
  storageBucket: "ctg-click-shop-crm.firebasestorage.app",
  messagingSenderId: "418153694896",
  appId: "1:418153694896:web:9821e895e5f41d441ddd75"
};
/* Cloud Messaging → Web Push certificates → "Key pair" টা এখানে বসান */
const VAPID_KEY = "BF1l_tRjCN3Skeo3Cl5SGTrLC9vaK7EEYf8YZB8TBSg3s7EBcUYZOVKgQO5mRcYNNBSR5rXGcqwX5gO27GJ5ckw";
const FB_ON = FB_CONFIG.apiKey && FB_CONFIG.apiKey.indexOf("PASTE")<0;
const ICON_DATA='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#bd2020"/><g fill="none" stroke="#fff" stroke-width="5"><circle cx="32" cy="32" r="18"/><circle cx="32" cy="32" r="10"/></g><circle cx="32" cy="32" r="4" fill="#fff"/></svg>');

const Sync = {
  on:false, uid:null, email:'', db:null, auth:null, msg:null, timers:{}, unsubs:[],
  KEYS:['ctg-dpt-v1','ctg-24h-v2','ctg-life-v1','ctg-learn-v1','ctg-reminders-v1'],
  init(){
    if(!FB_ON){ return; }
    try{ if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG); }catch(e){ console.warn('FB init',e); return; }
    this.db=firebase.firestore(); this.auth=firebase.auth();
    try{ this.db.enablePersistence({synchronizeTabs:true}).catch(function(){}); }catch(e){}
    var self=this;
    this.auth.onAuthStateChanged(function(u){ if(u){ self.onLogin(u); } else { self.onLogout(); } });
  },
  onLogin(u){
    var self=this; this.uid=u.uid; this.email=u.email||''; this.on=true; hideLogin();
    this.unsubs.forEach(function(f){try{f();}catch(e){}}); this.unsubs=[];
    this.KEYS.forEach(function(k){
      var ref=self.db.collection('users').doc(self.uid).collection('state').doc(k);
      var un=ref.onSnapshot(function(snap){
        if(!snap.exists) return;
        var d=snap.data(); if(!d||d.json==null) return;
        if(localStorage.getItem(k)!==d.json){ localStorage.setItem(k,d.json); rerender(); }
      }, function(){});
      self.unsubs.push(un);
      ref.get().then(function(s){ if(!s.exists){ var local=localStorage.getItem(k); if(local) ref.set({json:local, ts:Date.now()}); } }).catch(function(){});
    });
    this.setupFCM();
    rerender();
  },
  onLogout(){ this.on=false; this.uid=null; this.email=''; this.unsubs.forEach(function(f){try{f();}catch(e){}}); this.unsubs=[]; showLogin(); },
  push(k,v){
    if(!this.on||!this.uid) return;
    var self=this; clearTimeout(this.timers[k]);
    this.timers[k]=setTimeout(function(){
      try{ self.db.collection('users').doc(self.uid).collection('state').doc(k).set({json:JSON.stringify(v), ts:Date.now()}); }catch(e){}
    },600);
  },
  async setupFCM(){
    if(!('Notification' in window) || !firebase.messaging) return;
    var self=this;
    try{
      var reg=await navigator.serviceWorker.register('./firebase-messaging-sw.js');
      this.msg=firebase.messaging();
      if(Notification.permission==='granted'){ await this.registerToken(reg); }
      this.msg.onMessage(function(p){ var n=(p && (p.notification||p.data))||{}; try{ new Notification(n.title||'Reminder',{body:n.body||'',icon:ICON_DATA}); }catch(e){} });
    }catch(e){ console.warn('FCM',e); }
  },
  async registerToken(reg){
    if(!this.on) return;
    try{
      if(!this.msg){ if(firebase.messaging) this.msg=firebase.messaging(); else return; }
      reg = reg || await navigator.serviceWorker.getRegistration('./firebase-messaging-sw.js') || await navigator.serviceWorker.register('./firebase-messaging-sw.js');
      var tok=await this.msg.getToken({vapidKey:VAPID_KEY, serviceWorkerRegistration:reg});
      if(tok){ this.db.collection('users').doc(this.uid).collection('tokens').doc(tok).set({token:tok, ua:navigator.userAgent, ts:Date.now()}); }
    }catch(e){ console.warn('token',e); }
  }
};
function rerender(){ try{ if(typeof App!=='undefined' && App.cur) App.show(App.cur); if(typeof renderHero==='function') renderHero(); }catch(e){} }

function setLoginErr(t){ var e=document.getElementById('loginErr'); if(e){ e.textContent=t||''; e.style.display=t?'block':'none'; } }
function doLogin(){ if(!FB_ON)return; setLoginErr(''); Sync.auth.signInWithEmailAndPassword(lv('liEmail'),lv('liPass')).catch(function(err){ setLoginErr(err.message); }); }

const pct=allLeaves.length?Math.round(learned*100/allLeaves.length):0;
let h='<div class="grid3" style="margin-bottom:16px;text-align:center">';
[[D.nodes.length,'মোট Node','var(--tp)'],[learned+'/'+allLeaves.length,'শেখা Skill','var(--gn)'],[pct+'%','Progress','var(--ac)']].forEach(x=>h+='<div class="sg"><div style="font-size:19px;font-weight:700;color:'+x[2]+'">'+x[0]+'</div><div style="font-size:11px;color:var(--tm)">'+x[1]+'</div></div>');
h+='</div>';
if(!roots.length)return h+'<div class="empty">এখনো topic নেই।</div>';
h+='<div class="h"><i class="ti ti-list-tree"></i> Topic-wise Progress</div>';
roots.forEach(r=>{const lv=leaves(r.id).filter(Boolean);const dn=lv.filter(n=>n.done).length;const p=prog(r.id);const weak=p<30;
h+='<div class="card" style="cursor:pointer" onclick="LEARN.go(\'tree\')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><div style="font-size:14px;font-weight:600">'+esc(r.title)+(weak&&lv.length?' <span class="b bR" style="margin-left:4px">weak</span>':'')+'</div><span style="font-size:12px;font-weight:700;color:'+(p>=100?'var(--gn)':'var(--ac)')+'">'+p+'%</span></div><div class="pbar" style="margin:0 0 6px"><div style="width:'+p+'%;background:'+(p>=100?'var(--gn)':'var(--ac)')+'"></div></div><div style="font-size:11px;color:var(--tm)">'+dn+'/'+lv.length+' skill শেখা · '+kids(r.id).length+' direct sub</div></div>';});
return h;
}
let _node=null;
function escA(s){return esc(s).replace(/"/g,'&quot;');}
function openNode(id){const n=byId(id);if(!n)return;_node=id;const has=kids(id).length>0;
let h='<div class="modalhead"><div style="font-size:16px;font-weight:700;display:flex;align-items:center;gap:7px"><i class="ti ti-'+(has?'folder':'bulb')+'"></i> '+(has?'Topic':'Skill')+' Detail</div><button onclick="LEARN.closeNode()" style="background:var(--s1);border:none;width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--ts)">✕</button></div>';
h+='<label class="lbl">নাম</label><input id="ndTitle" value="'+escA(n.title)+'">';
h+='<label class="lbl">⏱ Countdown Timer (Deadline)</label><input type="datetime-local" id="ndDl" value="'+(n.deadline||'')+'">';
h+='<div style="text-align:right;margin:-6px 0 10px"><button onclick="LEARN.clearDL()" style="font-size:11px;color:var(--rd);background:none;border:none;cursor:pointer;font-family:var(--fs)">deadline মুছুন</button></div>';
h+='<label class="lbl">📝 Note / Book / Framework</label><textarea id="ndNote" rows="9" placeholder="বিস্তারিত নোট, বই-এর সারাংশ, framework, step-by-step — সব এখানে লিখুন...">'+esc(n.note||'')+'</textarea>';
if(!has)h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><div class="ck '+(n.done?'on':'')+'" id="ndCk" onclick="LEARN.toggleDoneM()">'+(n.done?'✓':'')+'</div><span style="font-size:13px;color:var(--ts)">শেখা হয়েছে (Done)</span></div>';
h+='<button class="sb" onclick="LEARN.saveNode()"><i class="ti ti-device-floppy"></i> Save</button>';
h+='<div class="grid2" style="margin-top:8px"><button onclick="LEARN.addChildM()" style="padding:11px;background:var(--acb);color:var(--ac);border:none;border-radius:11px;font-family:var(--fs);font-size:13px;font-weight:500;cursor:pointer">＋ sub যোগ</button><button onclick="LEARN.delM()" style="padding:11px;background:var(--rdb);color:var(--rd);border:none;border-radius:11px;font-family:var(--fs);font-size:13px;font-weight:500;cursor:pointer">মুছুন</button></div>';
document.getElementById('nodeSheet').innerHTML=h;document.getElementById('nodeModal').classList.add('open');}
function closeNode(){const m=document.getElementById('nodeModal');if(m)m.classList.remove('open');}
function clearDL(){const e=document.getElementById('ndDl');if(e)e.value='';}
function toggleDoneM(){const n=byId(_node);if(!n)return;n.done=!n.done;const ck=document.getElementById('ndCk');if(ck){ck.classList.toggle('on',n.done);ck.textContent=n.done?'✓':'';}}
function saveNode(){const n=byId(_node);if(!n)return;const t=(document.getElementById('ndTitle').value||'').trim();if(t)n.title=t;n.deadline=document.getElementById('ndDl').value||'';n.note=document.getElementById('ndNote').value||'';save();render();closeNode();}
function addChildM(){const id=_node;closeNode();addChild(id);}
function delM(){const id=_node;closeNode();del(id);}
return{init,go,addRoot,addChild,rename,toggleDone,toggleCol,del,seed,openNode,closeNode,clearDL,toggleDoneM,saveNode,addChildM,delM};
})();
/* ============ BOOT ============ */
Sync.init();
App.show('life');
</script>
