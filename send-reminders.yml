name: Send Reminders
on:
  schedule:
    - cron: '*/10 * * * *'   # প্রতি ১০ মিনিটে চলবে (UTC); script BD সময় হিসাব করে
  workflow_dispatch:          # হাতে চালানোর জন্য বাটন

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm init -y && npm install firebase-admin@12
      - name: Send due reminders
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/send-reminders.js
